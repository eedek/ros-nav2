controller_manager:
  ros__parameters:
    update_rate: 1000 # Hz
    use_sim_time: true

    ackermann_steering_controller:
      type: ackermann_steering_controller/AckermannSteeringController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

ackermann_steering_controller:
  ros__parameters:
    use_sim_time: true
    
    traction_joints_names: [rear_left_wheel_joint, rear_right_wheel_joint]
    steering_joints_names: [front_left_steering_joint, front_right_steering_joint]


    wheelbase: 0.33
    traction_track_width: 0.22    
    steering_track_width: 0.19     
    traction_wheels_radius: 0.035 
    steering_wheels_radius: 0.035  


    open_loop: false 
    position_feedback: false
    use_stamped_vel: false
    enable_odom_tf: false
    base_frame_id: base_footprint
    odom_frame_id: odom
    # odom_topic_name: /odom


    linear.x.max_velocity: 3.5
    angular.z.max_position: 0.61